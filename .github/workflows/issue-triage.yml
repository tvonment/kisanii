name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    name: Auto-label and greet
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels based on title keywords
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body  = (context.payload.issue.body ?? '').toLowerCase();
            const text  = title + ' ' + body;
            const labels = [];

            if (/bug|fehler|broken|error|crash|fix/.test(text))       labels.push('bug');
            if (/konzert|concert|show|gig|live/.test(text))           labels.push('concert');
            if (/news|aktuell|release|single|ep|album/.test(text))    labels.push('news');
            if (/text|copy|wording|übersetzung|translation/.test(text)) labels.push('content');
            if (/design|layout|style|farbe|color/.test(text))         labels.push('design');
            if (/feature|wunsch|request|add|neu|new/.test(text))      labels.push('enhancement');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.issue.number,
                labels,
              });
            }

      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const isDE = /[äöüß]/.test(
              (context.payload.issue.title + (context.payload.issue.body ?? '')).toLowerCase()
            );

            const comment = isDE
              ? `Danke für dein Issue! 🙏\n\nWir schauen es uns so schnell wie möglich an. Falls es sich um eine Inhaltsänderung handelt (News, Konzert), beschreib bitte genau, was hinzugefügt, geändert oder entfernt werden soll.\n\n— Kisanii Website`
              : `Thanks for opening an issue! 🙏\n\nWe'll look into it as soon as possible. If this is a content change (news, concert), please describe exactly what should be added, changed, or removed.\n\n— Kisanii Website`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.issue.number,
              body: comment,
            });
